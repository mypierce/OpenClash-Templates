; =========================================================
; OpenClash 超便利节点模板 (Fzlwhyc Edition)
; 作者：Fzlwhyc  |  存储位置：GitHub 托管
; =========================================================
;
; 【💡 为什么你需要这个模板？】
; 许多机场自带的订阅配置，把所有节点粗暴地堆砌在一起，面板杂乱，观感乱、手感差。
; 本模板深度重构了 OpenClash 的网络优选体验，为你解决选择困难症，让合适的节点在合适的时候，自动出现在最顺手的位置。
;
; 【🚀 本模板带来的四大核心便利】
; 
; 1. 🎯 业务级“智能优先级”排序 (核心亮点)
;    告别无脑的“全局择优”！本模板根据各大互联网公司的版权与风控逻辑，为你把各组的最优解排在了首位：
;    - 👽 AI 服务：优先展示 [日/美/台/韩]，剔除[香港]节点，降低封号与风控率。
;    - 🎬 流媒体：优先展示 [港/台] 节点，确保奈飞/迪士尼解锁率及原生中文字幕。
;    - 📡 Telegram：优先展示 [新/港] 节点，直连亚洲核心数据中心，图文秒开。
;    - 🎵 TikTok：优先展示 [台/日/新/美] 节点，精准规避 [香港] 锁区雷达，解锁全球短视频趋势与繁中评论区。
;    - 📘 下载/GitHub：优先展示 [新/日/韩] 节点，吃满亚太海底光缆极限大带宽。
;
; 2. 🎛️ 交互重构与“精准锁定”机制
;    - 👁️ 视觉降噪：将可点选操作的“手动挡”提前，不可操作的“自动测速挡”沉底，首屏干净清爽。
;    - 🌍 区域锁定：【国外总模式】作为全局中枢，功能等同于指定国家或地区，择优速而行。
;    - 📦 冷热分流哲学：摒弃将所有节点塞入一个大下拉框的臃肿做法。将“同地区多节点”和“单节点小众地区”划分为两类。查找清晰，机场核心节点突出，冷门节点不再淹没。
;    - 🎯 节点精准狙击：弥补了 OpenClash 常规配置的一大痛点，将代理锁定在单一节点上，让 PassWall 吃灰。
;
; =========================================================

[custom]

enable_rule_generator=true
overwrite_original_rules=true

; =========================================================
; 01. 锁地区模式 (地区内节点自动择优而行)
; =========================================================
custom_proxy_group=🌐 国外总模式`select`[]♻️ 全部-自动`[]🌏 亚太-自动`[]🇨🇳 港台-自动`[]🇭🇰 香港-自动`[]🇹🇼 台湾-自动`[]🇯🇵 日本-自动`[]🇸🇬 新加坡-自动`[]🇰🇷 韩国-自动`[]🇺🇸 美国-自动`[]🔥 热门-手动`[]❄️ 冷门-手动`[]DIRECT

